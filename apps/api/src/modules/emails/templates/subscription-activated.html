<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sua assinatura está ativa · Boxing Club</title>
</head>
<body style="margin:0;padding:0;background:#faf7f0;font-family:sans-serif;color:#0e1410;">
  <div style="max-width:560px;margin:40px auto;padding:0 16px;">
    <div style="display:flex;height:4px;margin-bottom:0;">
      <div style="flex:1;background:#0d6b3a;"></div>
      <div style="flex:1;background:#ffffff;border-top:1px solid #e7e5e0;border-bottom:1px solid #e7e5e0;"></div>
      <div style="flex:1;background:#c41e2a;"></div>
    </div>
    <div style="background:#ffffff;border:1px solid #e7e5e0;border-top:none;padding:40px 40px 32px;">
      <div style="text-align:center;margin-bottom:32px;">
        <img src="https://boxingclub.com.br/logo.png" alt="Boxing Club" style="width:56px;height:56px;object-fit:contain;" onerror="this.style.display='none'"/>
        <div style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#0d6b3a;font-weight:700;margin-top:8px;">Boxing Club · Ribeirão Preto</div>
      </div>

      <h1 style="font-size:28px;letter-spacing:0.05em;text-transform:uppercase;color:#0e1410;margin:0 0 8px;text-align:center;">Assinatura ativa!</h1>
      <p style="color:#57534e;font-size:15px;text-align:center;margin:0 0 24px;">Olá, <strong>{{firstName}}</strong>! Sua assinatura do plano <strong>{{planName}}</strong> está ativa.</p>

      <div style="background:#0d6b3a10;border:1px solid #0d6b3a30;padding:20px 24px;text-align:center;margin-bottom:24px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:#0d6b3a;font-weight:700;margin-bottom:4px;">Próxima cobrança</div>
        <div style="font-size:24px;font-weight:700;color:#0e1410;">{{nextBilling}}</div>
      </div>

      <p style="color:#78716c;font-size:13px;text-align:center;margin:0;">Bem-vindo ao time! Venha treinar 💪</p>
    </div>

    <div style="padding:20px 0;text-align:center;">
      <p style="color:#a8a29e;font-size:11px;margin:0;">Boxing Club · R. Exemplo, 100 · Ribeirão Preto, SP</p>
      <p style="color:#a8a29e;font-size:11px;margin:4px 0 0;">&copy; 2026 Boxing Club. Todos os direitos reservados.</p>
    </div>
  </div>
</body>
</html>
