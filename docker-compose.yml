services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boxing
      POSTGRES_PASSWORD: boxing
      POSTGRES_DB: boxingclub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxing -d boxingclub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: development
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://boxing:boxing@db:5432/boxingclub
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
